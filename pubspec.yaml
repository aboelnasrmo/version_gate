name: version_gate
description: Lightweight Flutter package that checks for app updates on App Store and Google Play with zero configuration, smart frequency guards, and customizable UI.
version: 1.0.2
homepage: https://aboelnasr.com
repository: https://github.com/aboelnasrmo/version_gate
issue_tracker: https://github.com/aboelnasrmo/version_gate/issues
documentation: https://github.com/aboelnasrmo/version_gate#readme

topics:
  - update
  - version-check
  - app-update
  - play-store
  - app-store

screenshots:
  - description: "Update dialog shown when a new version is available"
    path: screenshots/update_dialog.png

funding:
  - https://buymeacoffee.com/aboelnasrmo

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  package_info_plus: ^8.0.0
  shared_preferences: ^2.2.0
  http: ^1.2.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.0

flutter:
